version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pizi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: pizi_root_2026
      MYSQL_DATABASE: pizi_db
      MYSQL_USER: pizi_user
      MYSQL_PASSWORD: pizi_pass_2026
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pizi-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: pizi-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI

volumes:
  mysql_data:
  redis_data:
